version: 1
metadata:
  name: LeetCode OIDC setup
  labels:
    blueprints.goauthentik.io/instantiate: 'true'
entries:
  # -------- Enrollment flow para que los usuarios puedan registrarse --------
  - model: authentik_stages_prompt.prompt
    identifiers:
      field_key: username
    attrs:
      label: Username
      type: username
      required: true
      placeholder: alice_dev
      order: 100

  - model: authentik_stages_prompt.prompt
    identifiers:
      field_key: name
    attrs:
      label: Name
      type: text
      required: true
      placeholder: Your full name
      order: 101

  - model: authentik_stages_prompt.prompt
    identifiers:
      field_key: email
    attrs:
      label: Email
      type: email
      required: true
      placeholder: you@example.com
      order: 102

  - model: authentik_stages_prompt.prompt
    identifiers:
      field_key: password
    attrs:
      label: Password
      type: password
      required: true
      placeholder: Password
      order: 103

  - model: authentik_stages_prompt.prompt
    identifiers:
      field_key: password_repeat
    attrs:
      label: Confirm Password
      type: password
      required: true
      placeholder: Confirm password
      order: 104

  - model: authentik_stages_prompt.promptstage
    identifiers:
      name: leetcode-enrollment-prompt
    attrs:
      fields:
        - !Find [authentik_stages_prompt.prompt, [field_key, username]]
        - !Find [authentik_stages_prompt.prompt, [field_key, name]]
        - !Find [authentik_stages_prompt.prompt, [field_key, email]]
        - !Find [authentik_stages_prompt.prompt, [field_key, password]]
        - !Find [authentik_stages_prompt.prompt, [field_key, password_repeat]]

  - model: authentik_stages_user_write.userwritestage
    identifiers:
      name: leetcode-enrollment-write
    attrs:
      create_users_as_inactive: false
      create_users_group: !Find [authentik_core.group, [name, USER]]

  - model: authentik_stages_user_login.userloginstage
    identifiers:
      name: leetcode-enrollment-login

  - model: authentik_flows.flow
    identifiers:
      slug: leetcode-enrollment
    attrs:
      designation: enrollment
      name: leetcode-enrollment
      title: Crear cuenta en LeetCode
      authentication: none

  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, leetcode-enrollment]]
      order: 0
    attrs:
      stage: !Find [authentik_stages_prompt.promptstage, [name, leetcode-enrollment-prompt]]

  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, leetcode-enrollment]]
      order: 1
    attrs:
      stage: !Find [authentik_stages_user_write.userwritestage, [name, leetcode-enrollment-write]]

  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !Find [authentik_flows.flow, [slug, leetcode-enrollment]]
      order: 2
    attrs:
      stage: !Find [authentik_stages_user_login.userloginstage, [name, leetcode-enrollment-login]]

  # Vincula el enrollment al stage de identificacion para que aparezca
  # el link "Need an account? Sign up." en la pantalla de login.
  - model: authentik_stages_identification.identificationstage
    identifiers:
      name: default-authentication-identification
    attrs:
      user_fields: ['email', 'username']
      enrollment_flow: !Find [authentik_flows.flow, [slug, leetcode-enrollment]]

  - model: authentik_core.group
    identifiers:
      name: USER
    attrs:
      is_superuser: false

  - model: authentik_core.group
    identifiers:
      name: SETTER
    attrs:
      is_superuser: false

  - model: authentik_core.group
    identifiers:
      name: ADMIN
    attrs:
      is_superuser: false

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Roles Mapping
    attrs:
      scope_name: roles
      description: Claim custom con los roles del usuario
      expression: |
        return {
            "roles": [group.name for group in user.ak_groups.all()],
        }

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Submissions Write
    attrs:
      scope_name: submissions:write
      description: Permite enviar soluciones
      expression: |
        return {}

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Submissions Read
    attrs:
      scope_name: submissions:read
      description: Permite leer las propias submissions
      expression: |
        return {}

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Problems Write
    attrs:
      scope_name: problems:write
      description: Permite crear y editar problemas
      expression: |
        return {}

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Contests Manage
    attrs:
      scope_name: contests:manage
      description: Permite gestionar contests (alias legacy)
      expression: |
        return {}

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Contests Write
    attrs:
      scope_name: contests:write
      description: Permite crear y editar contests
      expression: |
        return {}

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Contests Participate
    attrs:
      scope_name: contests:participate
      description: Permite inscribirse en contests
      expression: |
        return {}

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Problems Admin
    attrs:
      scope_name: problems:admin
      description: Acceso completo a problemas
      expression: |
        return {}

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Executor Execute
    attrs:
      scope_name: executor:execute
      description: Permite ejecutar codigo
      expression: |
        return {}

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Solutions Read
    attrs:
      scope_name: solutions:read
      description: Permite leer soluciones de otros
      expression: |
        return {}

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: Admin All
    attrs:
      scope_name: admin:all
      description: Acceso completo de administracion
      expression: |
        return {}

  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: leetcode-provider
    attrs:
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: public
      client_id: leetcode
      include_claims_in_id_token: true
      sub_mode: user_uuid
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:5173/auth/callback
        - matching_mode: strict
          url: http://localhost:5173/
        - matching_mode: strict
          url: http://localhost:5173
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, Roles Mapping]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, Submissions Write]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, Submissions Read]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, Problems Write]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, Contests Manage]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, Contests Write]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, Contests Participate]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, Problems Admin]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, Executor Execute]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, Solutions Read]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, Admin All]]

  - model: authentik_core.application
    identifiers:
      slug: leetcode
    attrs:
      name: LeetCode
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, leetcode-provider]]
      meta_launch_url: http://localhost:5173/

  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, leetcode]]
      group: !Find [authentik_core.group, [name, USER]]
      order: 0
    attrs:
      enabled: true

  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, leetcode]]
      group: !Find [authentik_core.group, [name, SETTER]]
      order: 1
    attrs:
      enabled: true

  - model: authentik_policies.policybinding
    identifiers:
      target: !Find [authentik_core.application, [slug, leetcode]]
      group: !Find [authentik_core.group, [name, ADMIN]]
      order: 2
    attrs:
      enabled: true

  - model: authentik_core.user
    identifiers:
      username: test-user
    attrs:
      name: Test User
      email: test-user@example.com
      password: Test123!
      groups:
        - !Find [authentik_core.group, [name, USER]]

  - model: authentik_core.user
    identifiers:
      username: test-setter
    attrs:
      name: Test Setter
      email: test-setter@example.com
      password: Test123!
      groups:
        - !Find [authentik_core.group, [name, USER]]
        - !Find [authentik_core.group, [name, SETTER]]

  - model: authentik_core.user
    identifiers:
      username: test-admin
    attrs:
      name: Test Admin
      email: test-admin@example.com
      password: Test123!
      groups:
        - !Find [authentik_core.group, [name, USER]]
        - !Find [authentik_core.group, [name, SETTER]]
        - !Find [authentik_core.group, [name, ADMIN]]
